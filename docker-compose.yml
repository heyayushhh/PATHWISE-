

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pathwise-postgres
    environment:
      POSTGRES_USER: pathwise
      POSTGRES_PASSWORD: pathwise123
      POSTGRES_DB: pathwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathwise -d pathwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pathwise-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.20-community
    container_name: pathwise-neo4j
    environment:
      NEO4J_AUTH: neo4j/pathwise123
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MS1 Core API
  ms1:
    build:
      context: .
      dockerfile: docker/ms1/Dockerfile
    container_name: pathwise-ms1
    environment:
      NODE_ENV: development
      PORT: 3001
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # MS2 AI Engine
  ms2:
    build:
      context: .
      dockerfile: docker/ms2/Dockerfile
    container_name: pathwise-ms2
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: pathwise123
    ports:
      - "3002:3002"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: pathwise-frontend
    ports:
      - "3000:3000"
    depends_on:
      - ms1
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
